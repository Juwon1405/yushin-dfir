# YuShin — Senior Analyst Playbook v1
# Target: insider-threat and DPRK IT-worker-style patterns

version: 1
name: senior-analyst-v1
author: YuShin (Bang Juwon)
target_case_class:
  - insider_threat_unauthorized_access
  - remote_hands_ip_kvm
  - living_off_the_land_execution

# ---------------------------------------------------------
# Phase sequence — strict order. The agent is forbidden
# from skipping ahead until the current phase is closed.
# ---------------------------------------------------------
sequence:
  - phase: volatile_first
    rationale: |
      Memory disappears. Network sockets disappear. Anything that
      evaporates on reboot is examined before anything that persists.
    mcp_calls:
      - analyze_memory_process_tree
      - analyze_memory_network_sockets
    exit_criteria:
      - memory_artifacts_enumerated: true
      - suspicious_processes_listed: true

  - phase: timeline_reconstruction
    rationale: |
      A timeline is the analyst's map. No hypothesis before the map.
    mcp_calls:
      - extract_mft_timeline
      - get_amcache
      - parse_prefetch
      - list_scheduled_tasks
    exit_criteria:
      - timeline_built: true
      - anomalies_surfaced: true

  - phase: anomaly_surfacing
    rationale: |
      Flag anomalies. Do not yet explain them. Explanation comes
      after the timeline is closed, not during construction.
    mcp_calls:
      - correlate_events
    exit_criteria:
      - anomaly_list_frozen: true

  - phase: hypothesis_formation
    rationale: |
      Form at most two competing hypotheses. One is not enough.
      Three is too many to validate under deadline pressure.
    outputs:
      - primary_hypothesis
      - alternative_hypothesis
    exit_criteria:
      - hypotheses_documented: true
      - confidence_scored: true

  - phase: cross_source_validation
    rationale: |
      Validate the primary hypothesis against a source that was
      not used to form it. If disk formed the hypothesis, test
      against memory. And vice versa.
    mcp_calls:
      - analyze_usb_history
      - correlate_events
    exit_criteria:
      - contradictions_resolved_or_flagged: true

  - phase: structured_report
    rationale: |
      Every claim carries an audit_id. No orphan findings.
    outputs:
      - report.pdf
      - report.json
    exit_criteria:
      - all_findings_have_audit_id: true
      - unresolved_items_documented: true

# ---------------------------------------------------------
# Self-challenge — the heart of senior-analyst judgment.
# Triggered every N iterations OR on specific events.
# ---------------------------------------------------------
self_challenge:
  trigger_every_iterations: 2
  trigger_on_events:
    - contradiction_flagged
    - confidence_jumped_above_0_8_in_one_step
    - single_source_hypothesis
  questions:
    - "What would I expect to see if this hypothesis were wrong?"
    - "Have I checked a source that would falsify it?"
    - "Is there an artifact I have NOT examined that a senior reviewer would ask about?"
    - "Am I anchoring on the first thing I saw?"
  action_on_unresolved:
    - add_to_progress_jsonl_as_unresolved
    - reduce_confidence_by_0_2
    - schedule_additional_mcp_call

# ---------------------------------------------------------
# Termination — what "done" looks like.
# ---------------------------------------------------------
termination:
  normal_exit:
    - all_phases_completed: true
    - all_findings_have_audit_id: true
    - self_challenge_passed_on_final_iteration: true
  forced_exit:
    - max_iterations_reached: true
    - on_forced_exit_write: closeout_report_with_unresolved_items

# ---------------------------------------------------------
# Evidence integrity — enforced by architecture, documented
# here only for transparency to reviewers.
# ---------------------------------------------------------
evidence_integrity:
  mount_mode: ro,noload
  forbidden_operations:
    - execute_shell
    - write_file
    - mount
    - umount
    - network_egress
  verification:
    - sha256_at_startup
    - sha256_at_finalization
    - mismatch_aborts_report
