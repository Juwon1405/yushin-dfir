name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Audit chain tests
        run: python3 tests/test_audit_chain.py

      - name: MCP surface tests
        run: python3 tests/test_mcp_surface.py
        env:
          PYTHONPATH: ${{ github.workspace }}/agentic_dart_audit/src:${{ github.workspace }}/agentic_dart_mcp/src

      - name: MCP bypass tests (adversarial)
        run: python3 tests/test_mcp_bypass.py
        env:
          PYTHONPATH: ${{ github.workspace }}/agentic_dart_audit/src:${{ github.workspace }}/agentic_dart_mcp/src

      - name: Agent end-to-end self-correction
        run: python3 tests/test_agent_self_correction.py
        env:
          PYTHONPATH: ${{ github.workspace }}/agentic_dart_audit/src:${{ github.workspace }}/agentic_dart_mcp/src:${{ github.workspace }}/agentic_dart_agent/src

      - name: Demo run
        run: bash examples/demo-run.sh

      - name: Accuracy measurement
        run: python3 scripts/measure_accuracy.py
        env:
          PYTHONPATH: ${{ github.workspace }}/agentic_dart_audit/src:${{ github.workspace }}/agentic_dart_mcp/src:${{ github.workspace }}/agentic_dart_agent/src
