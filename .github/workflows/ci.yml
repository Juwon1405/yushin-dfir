name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip wheel
          # Install dart_mcp via pip (verifies pyproject.toml is sane,
          # including that the sift_adapters subpackage is discovered)
          python3 -m pip install -e ./dart_mcp/

      - name: Audit chain tests
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src
        run: python3 tests/test_audit_chain.py

      - name: MCP surface tests
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src
        run: python3 tests/test_mcp_surface.py

      - name: MCP bypass tests (adversarial)
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src
        run: python3 tests/test_mcp_bypass.py

      - name: SIFT adapter tests (v0.5)
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src
        run: python3 tests/test_sift_adapters.py

      - name: Concurrency + edge cases
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src
        run: python3 tests/test_concurrency_and_edge_cases.py

      - name: Agent end-to-end self-correction
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src:${{ github.workspace }}/dart_agent/src
        run: python3 tests/test_agent_self_correction.py

      - name: Demo run (offline native tools)
        run: bash examples/demo-run.sh

      - name: SIFT adapter demo (graceful no-binary path)
        run: bash examples/sift-adapter-demo.sh

      - name: Accuracy measurement
        env:
          PYTHONPATH: ${{ github.workspace }}/dart_audit/src:${{ github.workspace }}/dart_mcp/src:${{ github.workspace }}/dart_agent/src
        run: python3 scripts/measure_accuracy.py

  url-reachability:
    name: URL reachability — verify every external reference in docs + case studies resolves
    runs-on: ubuntu-latest
    # Schedule on a separate cadence: don't block PR merge on transient
    # 3rd-party site outage, but get a daily-cron-style report of stale URLs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install httpx (async URL fetcher)
        run: python3 -m pip install httpx

      - name: Extract and check every http(s) URL in tracked .md files
        run: |
          python3 - <<'PY'
          import re, asyncio, sys
          from pathlib import Path
          import httpx

          REPO = Path('.')
          # Surfaces that must keep external references alive:
          #   top-level README, every per-case README, every doc, the DEVPOST page
          targets = []
          for pat in ('README.md', 'CHANGELOG.md', 'DEVPOST_SUBMISSION.md',
                      'docs/**/*.md', 'examples/case-studies/**/*.md',
                      'dart_*/README.md'):
              targets.extend(REPO.glob(pat))
          targets = sorted({p for p in targets if p.is_file()})

          url_re = re.compile(r'https?://[^\s)\]\>"`]+')
          # Skip placeholder / private domains
          skip_substrings = (
              'example.com', 'example.local', 'example-corp.com',
              'attacker-infra.xyz', 'finance-update-secure.tk',
              'evil.example.com', 'transfer.sh', 'bashupload.com',
              # Private corp infrastructure — only reachable inside LY
              'workers-hub.com', 'genai-gateway.flava-cloud.com',
              'chatai.workers-hub.com', 'git.linecorp.com',
              # User content placeholders
              'cdn-mirror-2.velolink.org', 'telemetry-velolink-cdn.com',
          )

          urls = []
          for f in targets:
              for m in url_re.finditer(f.read_text(errors='replace')):
                  u = m.group(0).rstrip('.,;:')
                  if any(s in u for s in skip_substrings):
                      continue
                  urls.append((f, u))

          # Dedupe while preserving first occurrence
          seen = set()
          unique = []
          for f, u in urls:
              if u not in seen:
                  seen.add(u)
                  unique.append((f, u))

          print(f"::group::URL inventory")
          print(f"  files scanned: {len(targets)}")
          print(f"  unique URLs:   {len(unique)}")
          print(f"::endgroup::")

          async def head(client, file, url):
              try:
                  # Some sites reject HEAD — fall back to ranged GET
                  r = await client.head(url, follow_redirects=True, timeout=10)
                  if r.status_code in (405, 403):
                      r = await client.get(url, follow_redirects=True, timeout=10,
                                           headers={'Range': 'bytes=0-1'})
                  return (file, url, r.status_code, None)
              except Exception as e:
                  return (file, url, None, str(e)[:80])

          async def main():
              limits = httpx.Limits(max_connections=8, max_keepalive_connections=4)
              ua = "Mozilla/5.0 (compatible; agentic-dart-ci/0.7; +https://github.com/Juwon1405/agentic-dart)"
              async with httpx.AsyncClient(headers={'User-Agent': ua}, limits=limits) as client:
                  results = await asyncio.gather(*(head(client, f, u) for f, u in unique))
              return results

          results = asyncio.run(main())
          bad = [(f, u, sc, err) for f, u, sc, err in results
                 if (sc is not None and sc >= 400) or err]
          ok_count = len(results) - len(bad)
          print(f"\n  alive: {ok_count}")
          print(f"  dead:  {len(bad)}")

          if bad:
              print("\n::group::Dead URLs")
              for f, u, sc, err in bad:
                  marker = f"HTTP {sc}" if sc else f"err {err}"
                  print(f"  [{marker}] {u}")
                  print(f"           -- referenced from {f}")
              print("::endgroup::")
              # Daily run: report-only; flip to sys.exit(1) once stable
              sys.exit(0)
          else:
              print("\nAll URLs resolve.")
          PY

  packaging:
    name: Packaging — verify pip install yields full MCP tool surface
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Pip install
        run: |
          python3 -m pip install --upgrade pip wheel
          python3 -m pip install -e ./dart_mcp/

      - name: Verify tool surface from installed package (not sys.path)
        run: |
          python3 - <<'PY'
          import os
          os.environ.setdefault('DART_EVIDENCE_ROOT', '/tmp/dart-ci-evidence')
          os.makedirs('/tmp/dart-ci-evidence', exist_ok=True)
          from dart_mcp import list_tools
          tools = list_tools()
          native = [t for t in tools if not t['name'].startswith('sift_')]
          sift = [t for t in tools if t['name'].startswith('sift_')]
          print(f"Total: {len(tools)}, native: {len(native)}, sift: {len(sift)}")
          # Invariants — not exact counts, so adding/removing tools doesn't
          # require CI edits. The exact count assertion lives in
          # tests/test_mcp_surface.py::test_registered_tools_are_exact_set
          # where the full canonical name set is verified.
          assert len(tools) > 0, "no tools registered"
          assert len(native) > 0, "no native tools"
          assert len(sift) > 0, "no SIFT adapter tools"
          assert len(native) + len(sift) == len(tools), "native+sift != total"
          # No 'execute_shell' / 'write_file' / 'eval' / 'mount' on the wire
          names = {t['name'] for t in tools}
          forbidden = {'execute_shell', 'write_file', 'eval', 'mount', 'rm', 'system'}
          leaked = names & forbidden
          assert not leaked, f"forbidden tools on MCP surface: {leaked}"
          print(f"\u2713 packaging surface verified — {len(tools)} tools ({len(native)} native + {len(sift)} SIFT)")
          PY
