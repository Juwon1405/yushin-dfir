# ---------------------------------------------------------------------------
# Operator notes — v3 — what changed and why it matters
# ---------------------------------------------------------------------------
operator_notes: |
  v3 is the industrialization release. v2 encoded a senior analyst's
  reasoning. v3 encodes a *mature SOC's* operating model around that
  reasoning.

  The four big additions:

  1. **Palantir ADS template** — every detection now has a documentation
     contract: goal, categorization, strategy, technical context, blind
     spots, false positives, validation, priority, response. This is
     what separates a hobby detection from one a $billion company will
     run on its production network.

  2. **MaGMa Use Case Framework** — three-tier (business / attack / detection)
     traceability with CMMI maturity scoring. Every case class now maps
     to an L2 attack pattern that maps to an L1 business driver. When a
     CISO asks "what does Agentic-DART defend against, in business
     terms?", the answer is structured.

  3. **TaHiTI hunt cycle** — when the deterministic playbook plateaus,
     the agent shifts into structured hunt mode (initiate / hunt /
     finalize) instead of looping forever or giving up. This is the
     missing piece between "automated investigation" and "automated
     hunting".

  4. **HMM self-classification** — every run reports its hunting
     maturity level (HMM 0–4). v3 ships at HMM3 (innovative). HMM4
     (leading — automated hypothesis generation) is the Phase 2 target.

  Everything from v2 is preserved. The architectural-first guarantees
  (read-only MCP, audit chain, contradiction enforcement) apply
  unchanged. The 35 functions are unchanged. Only the methodology
  surrounding them has matured.

  Forking this playbook for your case class:
    1. Copy this file to dart_playbook/<your-name>-v1.yaml
    2. Update target_case_classes with your MaGMa L2 mappings
    3. Tune next_call_decisions for your priorities
    4. Add environment-specific contradiction_triggers
    5. Add ADS templates for your custom detections
    6. Run with --playbook <your-name>-v1.yaml

  The architectural guarantees apply to every playbook. You cannot
  loosen them by forking.
