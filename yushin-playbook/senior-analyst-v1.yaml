# YuShin — Senior Analyst Playbook v1
# Target: insider-threat and DPRK IT-worker-style case classes
# Schema version: 1
---
metadata:
  name: senior-analyst-v1
  version: 1.0.0
  target_case_class:
    - insider_threat
    - dprk_it_worker
    - remote_hands_ip_kvm
  author: YuShin
  license: MIT

dependencies:
  mcp_functions:
    - get_amcache
    - extract_mft_timeline
    - parse_prefetch
    - analyze_usb_history
    - list_scheduled_tasks
    - correlate_events

# ---- Sequencing ----
# Senior analysts work volatile-first, then build a timeline, then challenge it.
sequence:
  - phase: volatile
    description: "Capture the most ephemeral signal before it decays further."
    steps:
      - call: list_scheduled_tasks
        rationale: "Persistence mechanisms fastest to enumerate from memory-adjacent state."
      - call: analyze_usb_history
        rationale: "USB evidence correlates with physical-world action; validate early."

  - phase: timeline
    description: "Build the skeleton timeline the rest of the analysis hangs on."
    steps:
      - call: extract_mft_timeline
        window: case_default
        rationale: "MFT is the anchor. Everything else is cross-referenced against it."
      - call: parse_prefetch
        target: "*"
        rationale: "Execution evidence corroborates or contradicts the MFT narrative."

  - phase: anomaly
    description: "Surface what does not fit the pattern of the environment."
    steps:
      - call: get_amcache
        rationale: "Installed/executed binaries with timestamps; rich anomaly surface."

  - phase: hypothesis
    description: "Form a named hypothesis and write it to progress.jsonl."
    rules:
      - must_write_hypothesis_to_progress_jsonl: true
      - must_declare_confidence: true
      - must_list_unresolved_gaps: true

  - phase: validate
    description: "Cross-source correlation. Contradictions are flagged, not smoothed."
    steps:
      - call: correlate_events
        hypothesis_id: "{current}"
        rationale: "Let the correlation engine find what the agent might rationalize away."

  - phase: report
    description: "Emit analyst-readable report with audit_id backrefs."
    rules:
      - every_finding_must_have_audit_id: true
      - unresolved_contradictions_must_be_listed: true

# ---- Contradiction patterns (trigger self-correction) ----
contradiction_patterns:
  - id: usb_precedes_logon
    description: >
      USB insert timestamp precedes the corresponding authenticated logon
      event by more than the tolerance window. Classic IP-KVM / remote-hands
      signature.
    detector: correlate_events
    tolerance_minutes: 2
    on_detect: iterate_with_expanded_usb_window

  - id: process_tree_vs_disk_disagree
    description: >
      Memory process tree shows execution that MFT/Prefetch does not
      corroborate. Possible in-memory-only payload or anti-forensics.
    detector: correlate_events
    on_detect: iterate_with_memory_deep_scan

  - id: scheduled_task_without_creator_logon
    description: >
      Scheduled task exists with no corresponding interactive logon of the
      creating principal in the window it was registered.
    detector: correlate_events
    on_detect: iterate_with_authentication_expansion

# ---- Self-correction branches ----
self_correction:
  iterate_with_expanded_usb_window:
    action: rerun_with_params
    target: analyze_usb_history
    param_overrides:
      window_minutes_before_logon: 10
      window_minutes_after_logon: 10

  iterate_with_memory_deep_scan:
    action: rerun_with_params
    target: correlate_events
    param_overrides:
      memory_scan_depth: deep
      include_unlinked_processes: true

  iterate_with_authentication_expansion:
    action: rerun_with_params
    target: correlate_events
    param_overrides:
      include_non_interactive_logons: true
      window_hours: 24

# ---- Termination ----
termination:
  max_iterations: 10
  terminate_when:
    - all_hypotheses_have_confidence_above: 0.85
    - no_unresolved_contradictions: true
  graceful_exit_on_cap: true

# ---- Hard rules ----
hard_rules:
  - agent_may_not_smooth_over_contradictions: true
  - agent_may_not_invoke_functions_not_listed_in_dependencies: true
  - every_finding_must_be_traceable_via_audit_id: true
  - evidence_is_read_only_at_os_level_and_mcp_surface: true
