[pytest]
# QA pass (2026-05-02): pin the test collection surface so a clean
# `pytest` invocation matches what README advertises.
#
# Why this file exists:
#   - tests/_pending/ holds tests for Phase 2 functions (parse_evtx,
#     match_sigma_rules) that are NOT on the current MCP surface.
#     Without `norecursedirs` they'd be auto-collected and fail.
#   - Anything Phase-2 belongs in _pending/ until its surface lands.
testpaths = tests
norecursedirs = _pending _archive .git .venv build dist *.egg-info __pycache__
filterwarnings =
    ignore::DeprecationWarning
